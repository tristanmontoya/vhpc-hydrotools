name: Build and push vHPC Hydrotools images

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: tristanmontoya/vhpc-hydrotools
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          sha_short=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "sha_short=$sha_short" >> $GITHUB_OUTPUT
          echo "timestamp=$(date -u +'%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT

          # Extract version from tag if this is a tag push
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "is_tag=true" >> $GITHUB_OUTPUT
          else
            echo "version=latest" >> $GITHUB_OUTPUT
            echo "is_tag=false" >> $GITHUB_OUTPUT
          fi

          echo "base_image=${REGISTRY}/${IMAGE_PREFIX}-base:$sha_short" >> $GITHUB_OUTPUT
          for image in base headnode worker; do
            tags="${REGISTRY}/${IMAGE_PREFIX}-$image:latest"
            tags="$tags"$'\n'"${REGISTRY}/${IMAGE_PREFIX}-$image:$sha_short"

            if [[ "${{ github.ref }}" == refs/tags/* ]]; then
              tags="$tags"$'\n'"${REGISTRY}/${IMAGE_PREFIX}-$image:${VERSION}"
            fi

            {
              echo "${image}_tags<<EOF"
              printf "%s\n" "$tags"
              echo "EOF"
            } >> $GITHUB_OUTPUT
          done

      - name: Build and push base image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Containerfile.slurm-base
          platforms: ${{ env.PLATFORMS }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta.outputs.base_tags }}

      - name: Build and push headnode image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Containerfile.slurm-headnode
          platforms: ${{ env.PLATFORMS }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BASE_IMAGE=${{ steps.meta.outputs.base_image }}
          tags: ${{ steps.meta.outputs.headnode_tags }}

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Containerfile.slurm-worker
          platforms: ${{ env.PLATFORMS }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BASE_IMAGE=${{ steps.meta.outputs.base_image }}
          tags: ${{ steps.meta.outputs.worker_tags }}

      - name: Clean up old images
        run: |
          # Keep only the 5 most recent builds for each image
          for image in base headnode worker; do
            echo "Cleaning up old versions of $image..."
            package_name="vhpc-hydrotools-$image"
            package_path="/users/tristanmontoya/packages/container/$package_name/versions"

            # Get all versions sorted by creation date, skip the 5 most recent
            OLD_VERSIONS=$(gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$package_path" \
              --jq 'sort_by(.created_at) | reverse | .[5:] | .[].id')

            # Delete old versions
            for version_id in $OLD_VERSIONS; do
              echo "Deleting version $version_id of $package_name"
              gh api \
                --method DELETE \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "$package_path/$version_id" || \
                echo "Failed to delete version $version_id"
            done
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
